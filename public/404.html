<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      // GitHub Pages SPA: store the full path and redirect to index
      sessionStorage.setItem('spa-redirect', location.pathname + location.search + location.hash)
      location.replace('/')
    </script>
  </head>
  <body></body>
</html>
